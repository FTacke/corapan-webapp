# Canonical production compose for the application stack.

services:
  db:
    image: postgres:14
    container_name: corapan-db-prod
    environment:
      POSTGRES_USER: corapan_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: corapan_auth
    volumes:
      - corapan_postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "corapan_app", "-d", "corapan_auth"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: always
    networks:
      - corapan-network-prod
    # Production: no external port exposure, only internal network

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: corapan-web-prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Expose on host for reverse proxy (nginx)
      - "127.0.0.1:6000:5000"
    environment:
      # Flask / App config
      FLASK_ENV: production
      FLASK_DEBUG: "false"
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:?FLASK_SECRET_KEY is required}
      APP_RELEASE_TAG: ${APP_RELEASE_TAG:-}
      APP_RELEASE_URL: ${APP_RELEASE_URL:-}
      APP_REPOSITORY_URL: ${APP_REPOSITORY_URL:-https://github.com/FTacke/corapan-webapp}
      GOATCOUNTER_URL: ${GOATCOUNTER_URL:-}
      
      # Auth Database: connect to 'db' service (hostname inside Docker network)
      AUTH_DATABASE_URL: postgresql+psycopg2://corapan_app:${POSTGRES_PASSWORD}@db:5432/corapan_auth
      # JWT settings (production: secure cookies)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_COOKIE_SECURE: "true"

      # Runtime roots (host runtime root is mounted into container at same path)
      CORAPAN_RUNTIME_ROOT: ${CORAPAN_RUNTIME_ROOT:-/app}
      CORAPAN_MEDIA_ROOT: ${CORAPAN_MEDIA_ROOT:-/app/media}
      PUBLIC_STATS_DIR: ${PUBLIC_STATS_DIR:-/app/data/public/statistics}
      STATS_TEMP_DIR: ${STATS_TEMP_DIR:-/app/data/stats_temp}
      
      # Session cookies
      FLASK_SESSION_SECURE: "true"
      FLASK_SESSION_SAMESITE: lax
      
      # Admin user creation (only needed on first deploy)
      START_ADMIN_USERNAME: ${START_ADMIN_USERNAME:-admin}
      START_ADMIN_PASSWORD: ${START_ADMIN_PASSWORD:-}
      
      # Hashing algorithm
      AUTH_HASH_ALGO: argon2

      # Production guardrail: BlackLab must be reachable via Docker network name,
      # not via localhost/host-port mapping.
      BLS_BASE_URL: http://corapan-blacklab:8080/blacklab-server
      BLS_CORPUS: corapan
    volumes:
      # Production uses the canonical top-level layout.
      # Container paths (/app/*) remain the stable internal API.
      - /srv/webapps/corapan/data:/app/data
      - /srv/webapps/corapan/media:/app/media
      - /srv/webapps/corapan/logs:/app/logs
      - /srv/webapps/corapan/data/config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always
    networks:
      - corapan-network-prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  corapan-network-prod:
    name: corapan-network-prod

volumes:
  corapan_postgres_prod:
    name: corapan_postgres_prod
