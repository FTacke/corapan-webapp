<div class="md3-footer" data-element="site-footer">
  <div class="md3-footer__content">
    <!-- Logo as Border Marker -->
    <img src="{{ url_for('static', filename=footer_logo_asset) }}"
         alt="{{ app_logo_alt }}"
         class="md3-footer__logo-marker"
         width="40" height="40" decoding="async" />

    <!-- Brand/Badge First -->
    <a href="{{ footer_brand_url }}"
       class="md3-footer__brand"
       target="_blank" rel="noopener noreferrer"
       aria-label="{{ footer_brand_label }}">
      <img src="{{ url_for('static', filename=footer_brand_badge_asset) }}"
         alt="{{ footer_brand_badge_alt }}"
           width="85" height="20" decoding="async" />
    </a>

    <!-- Navigation -->
    <nav class="md3-footer__nav md3-body-small" aria-label="Rechtliches">
      <ul class="md3-footer__list">
        <li><a href="{{ url_for('public.impressum_page') }}">Impressum</a></li>
        <li><a href="{{ url_for('public.privacy_page') }}">Datenschutz</a></li>
      </ul>
    </nav>

    <!-- Copyright -->
    <p class="md3-footer__copy md3-body-small">
      © {% if now is defined %}{{ now().year }}{% else %}{{ "2025" }}{% endif %} {{ institution_name }} · {{ footer_copyright_holder }}
    </p>

    {% if app_version and app_release_url %}
    <p class="md3-footer__version md3-body-small">
      <a href="{{ app_release_url }}"
         class="md3-footer__version-link"
         title="Versión {{ app_version }} (hacer clic para ver detalles)"
         aria-label="Versión {{ app_version }} (hacer clic para ver detalles)"
         target="_blank" rel="noopener noreferrer">v{{ app_version }}</a>
    </p>
    {% endif %}
    
    <!-- Build ID for deployment verification -->
    <!-- BUILD {{ config.get('APP_BUILD_ID', 'dev') }} -->
  </div>
</div>
