# MD3 Lint Workflow
# -----------------
# Variante A: Läuft nur bei Pull Requests gegen main.
# Nicht bei jedem Push, um CI-Last zu reduzieren.
# Für manuelles Auslösen: workflow_dispatch hinzufügen.
#
# Lokales Testen:
#   python scripts/md3-lint.py
#   python scripts/md3-forms-auth-guard.py

name: MD3 Lint

on:
  # Nur PRs gegen main lösen den Workflow aus
  pull_request:
    branches:
      - main
    paths:
      - 'app/templates/**'
      - 'app/static/css/md3/components/**'
      - 'app/scripts/**'
  # Manuelles Auslösen jederzeit möglich
  workflow_dispatch:

permissions:
  contents: read

jobs:
  md3-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt || true

      - name: Run md3-forms/auth guard
        run: |
          python scripts/md3-forms-auth-guard.py

      - name: Run md3-lint
        run: |
          python scripts/md3-lint.py
