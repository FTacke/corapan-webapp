name: CI

on:
  push:
    branches: [ main, prod_prep ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: |
          app/requirements.txt
          app/requirements-dev.txt
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Check project structure
      run: |
        python scripts/check_structure.py

    - name: Prepare minimal runtime for CI
      run: |
        set -euo pipefail
        export R=/tmp/runtime
        mkdir -p "$R"/data/config
        mkdir -p "$R"/{data,media,logs}
        mkdir -p "$R"/data/blacklab/export
        # tests expect this file; empty is fine for collection
        touch "$R"/data/blacklab/export/docmeta.jsonl
        echo "CI runtime prepared at $R"
        
    - name: Lint with Ruff
      run: |
        ruff check src/app tests
        
    - name: Run fast pytest suite
      env:
        FLASK_ENV: testing
        FLASK_SECRET_KEY: test-key
        JWT_SECRET_KEY: test-jwt-key
        AUTH_HASH_ALGO: argon2
        BLS_CORPUS: corapan
        CORAPAN_RUNTIME_ROOT: /tmp/runtime
        CORAPAN_MEDIA_ROOT: /tmp/runtime/media
        CORAPAN_DATA_ROOT: /tmp/runtime/data
      run: |
        pytest -q \
          --ignore=tests/test_ci_auth_smoke.py \
          --ignore=tests/test_corpus_guia.py \
          --ignore=tests/test_advanced_datatables_results.py

  auth-hash-compat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run auth hash compatibility tests
        env:
          CORAPAN_RUNTIME_ROOT: /tmp/runtime
          CORAPAN_MEDIA_ROOT: /tmp/runtime/media
          BLS_CORPUS: corapan
        run: |
          mkdir -p /tmp/runtime/media /tmp/runtime/data/blacklab/export
          touch /tmp/runtime/data/blacklab/export/docmeta.jsonl
          pytest -q tests/test_auth_hash_algorithms.py

  migration-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: corapan_auth
          POSTGRES_DB: corapan_auth
          POSTGRES_PASSWORD: corapan_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U corapan_auth -d corapan_auth" --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Wait for Postgres
        env:
          AUTH_DATABASE_URL: postgresql+psycopg2://corapan_auth:corapan_auth@localhost:5432/corapan_auth
        run: |
          python - <<'PY'
          import os
          import time
          import psycopg2

          dsn = os.environ["AUTH_DATABASE_URL"].replace("+psycopg2", "")
          last_error = None
          for _ in range(30):
              try:
                  conn = psycopg2.connect(dsn)
                  conn.close()
                  print("Postgres is ready")
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"Postgres did not become ready: {last_error}")
          PY

      - name: Apply migration
        env:
          AUTH_DATABASE_URL: postgresql+psycopg2://corapan_auth:corapan_auth@localhost:5432/corapan_auth
          AUTH_HASH_ALGO: argon2
        run: |
          python scripts/apply_auth_migration.py --engine postgres

      - name: Prepare minimal runtime for CI
        run: |
          set -euo pipefail
          export R=/tmp/runtime
          mkdir -p "$R"/data/config
          mkdir -p "$R"/{data,media,logs}
          mkdir -p "$R"/data/blacklab/export
          touch "$R"/data/blacklab/export/docmeta.jsonl
          echo "CI runtime prepared at $R"

      - name: Smoke check auth DB
        env:
          AUTH_DATABASE_URL: postgresql+psycopg2://corapan_auth:corapan_auth@localhost:5432/corapan_auth
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, text
          import os

          engine = create_engine(os.environ["AUTH_DATABASE_URL"])
          with engine.connect() as conn:
              conn.execute(text("SELECT 1"))
          print("Auth DB smoke check OK")
          PY

      - name: Run auth tests against Postgres
        env:
          FLASK_ENV: testing
          FLASK_SECRET_KEY: test-key
          JWT_SECRET_KEY: test-jwt-key
          AUTH_DATABASE_URL: postgresql+psycopg2://corapan_auth:corapan_auth@localhost:5432/corapan_auth
          AUTH_HASH_ALGO: argon2
          BLS_CORPUS: corapan
          CORAPAN_RUNTIME_ROOT: /tmp/runtime
          CORAPAN_MEDIA_ROOT: /tmp/runtime/media
          CORAPAN_DATA_ROOT: /tmp/runtime/data
        run: |
          pytest -q \
            tests/test_ci_auth_smoke.py \
            tests/test_corpus_guia.py \
            tests/test_advanced_datatables_results.py

  playwright-e2e:
    runs-on: ubuntu-latest
    needs: fast-checks
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: app
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: corapan_auth
          POSTGRES_DB: corapan_auth
          POSTGRES_PASSWORD: corapan_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U corapan_auth -d corapan_auth" --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Wait for Postgres
        env:
          AUTH_DATABASE_URL: postgresql+psycopg2://corapan_auth:corapan_auth@localhost:5432/corapan_auth
        run: |
          python - <<'PY'
          import os
          import time
          import psycopg2

          dsn = os.environ["AUTH_DATABASE_URL"].replace("+psycopg2", "")
          last_error = None
          for _ in range(30):
              try:
                  conn = psycopg2.connect(dsn)
                  conn.close()
                  print("Postgres is ready")
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"Postgres did not become ready: {last_error}")
          PY

      - name: Apply auth migration
        env:
          AUTH_DATABASE_URL: postgresql+psycopg2://corapan_auth:corapan_auth@localhost:5432/corapan_auth
          AUTH_HASH_ALGO: argon2
        run: |
          python scripts/apply_auth_migration.py --engine postgres

      - name: Create E2E user
        env:
          AUTH_DATABASE_URL: postgresql+psycopg2://corapan_auth:corapan_auth@localhost:5432/corapan_auth
          AUTH_HASH_ALGO: argon2
          START_ADMIN_USERNAME: e2e_user
          START_ADMIN_PASSWORD: password123
          FLASK_ENV: testing
          BLS_CORPUS: corapan
          CORAPAN_RUNTIME_ROOT: /tmp/runtime
          CORAPAN_MEDIA_ROOT: /tmp/runtime/media
          CORAPAN_DATA_ROOT: /tmp/runtime/data
        run: |
          mkdir -p /tmp/runtime/media /tmp/runtime/data/blacklab/export
          touch /tmp/runtime/data/blacklab/export/docmeta.jsonl
          python scripts/create_initial_admin.py --username e2e_user --password password123

      - name: Prepare minimal runtime for E2E
        run: |
          set -euo pipefail
          export R=/tmp/runtime
          mkdir -p "$R"/data/config
          mkdir -p "$R"/{data,media,logs}
          mkdir -p "$R"/data/blacklab/export
          touch "$R"/data/blacklab/export/docmeta.jsonl
          echo "E2E runtime prepared at $R"

      - name: Start server
        env:
          FLASK_ENV: testing
          FLASK_SECRET_KEY: test-secret
          JWT_SECRET_KEY: test-secret
          AUTH_DATABASE_URL: postgresql+psycopg2://corapan_auth:corapan_auth@localhost:5432/corapan_auth
          AUTH_HASH_ALGO: argon2
          BLS_CORPUS: corapan
          CORAPAN_RUNTIME_ROOT: /tmp/runtime
          CORAPAN_MEDIA_ROOT: /tmp/runtime/media
          CORAPAN_DATA_ROOT: /tmp/runtime/data
        run: |
          python -u -m src.app.main > /tmp/corapan-server.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf "http://127.0.0.1:8000/login" >/dev/null 2>&1; then
              echo "server up"
              exit 0
            fi
            sleep 1
          done
          cat /tmp/corapan-server.log
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Playwright and browsers
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright E2E
        env:
          E2E_BASE_URL: http://127.0.0.1:8000
        run: |
          npm run test:e2e
